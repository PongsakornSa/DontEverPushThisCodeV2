name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write        # TODO#0a (upload SARIF)
  issues: write                 # TODO#0b
  pull-requests: write          # TODO#0b
  id-token: write               # TODO#0c (OIDC)
  actions: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # TODO#1

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified   # TODO#3

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # TODO#5

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        language: [ 'javascript' ]   # TODO#7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality   # TODO#8

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3   # TODO#9
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # TODO#10

      - name: Install dependencies
        run: npm ci   # TODO#11

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.'
          format: 'SARIF'   # TODO#12
          out: 'reports'
          args: >
            --failOnCVSS 7   # TODO#13
            --enableRetired

      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3   # TODO#14
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Upload Depcheck HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4   # TODO#15
        with:
          name: depcheck-report
          path: reports/

  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:latest .   # TODO#16

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          format: 'sarif'   # TODO#17
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'   # TODO#18
          ignore-unfixed: false   # TODO#19

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3   # TODO#20
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4   # TODO#21.
        with:
          name: trivy-report
          path: trivy-results.sarif
